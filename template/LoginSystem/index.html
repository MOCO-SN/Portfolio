<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Auth | Modern Register & Login</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Keep original external script references (firebase auth + logic) but provide robust UI enhancement -->
    <script type="module" src="firebaseauth.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SIGNUP FORM -->
    <div class="container" id="signup" style="display:none;">
        <h1 class="form-title">✨ Register</h1>
        <form method="post" action="">
            <div id="signUpMessage" class="messageDiv" style="display:none;"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="fName" placeholder="First Name" required autocomplete="given-name">
            </div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="lName" placeholder="Last Name" required autocomplete="family-name">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="rEmail" placeholder="Email address" required autocomplete="email">
            </div>
            <div class="input-group" style="position: relative;">
                <i class="fas fa-lock"></i>
                <input type="password" id="rPassword" placeholder="Create password" required autocomplete="new-password">
                <button type="button" class="password-toggle" data-target="rPassword" aria-label="Show password">
                    <i class="fa-regular fa-eye-slash"></i>
                </button>
            </div>
            <button class="btn" id="submitSignUp" type="button">Create account →</button>
        </form>
        <div class="links">
            <p>Already have an account?</p>
            <button id="signInButton">Sign in</button>
        </div>
        <div class="brand-note">Secure • Modern</div>
    </div>
    <!-- SIGNIN FORM -->
    <div class="container" id="signIn">
        <h1 class="form-title">🔐 Welcome back</h1>
        <form method="post" action="">
            <div id="signInMessage" class="messageDiv" style="display:none;"></div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email address" required autocomplete="email">
            </div>
            <div class="input-group" style="position: relative;">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="password-toggle" data-target="password" aria-label="Show password">
                    <i class="fa-regular fa-eye-slash"></i>
                </button>
            </div>
            <p class="recover">
                <a href="#" id="recoverLink">Forgot password?</a>
            </p>
            <button class="btn" id="submitSignIn" type="button">Log in →</button>
        </form>
        <div class="links">
            <p>Don't have an account?</p>
            <button id="signUpButton">Create free account</button>
        </div>
        <div class="brand-note">Fast • Seamless</div>
    </div>
    <script>
    </script>
    <!-- external original scripts (firebase auth logic + script.js) kept for full functionality -->
    <script src="script.js"></script>
</body>
</html>
