<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SMART AUTH · Secure License System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c0f, #030303);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .box {
      max-width: 500px;
      width: 100%;
      background: rgba(18, 18, 24, 0.95);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 48, 48, 0.35);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 48, 48, 0.1), 0 0 18px rgba(255, 0, 0, 0.3);
    }

    .title {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .sub {
      text-align: center;
      font-size: 0.75rem;
      color: #9aa0b0;
      margin-bottom: 2rem;
      border-bottom: 1px dashed #2c2f36;
      display: inline-block;
      width: 100%;
      padding-bottom: 0.6rem;
    }

    .line {
      margin-bottom: 1.4rem;
    }

    .label {
      color: #70e5ff;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #2e2e3a;
      outline: none;
      border-radius: 1.2rem;
      background: #0f0f14;
      color: #f0f3fa;
      font-size: 0.95rem;
      font-family: monospace;
      transition: 0.2s;
    }

    input:focus {
      border-color: #ff4d4d;
      box-shadow: 0 0 0 3px rgba(255, 48, 48, 0.2);
      background: #111116;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 2rem;
      background: linear-gradient(95deg, #e03a3a, #c81e1e);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.6rem;
      box-shadow: 0 4px 12px rgba(220, 20, 60, 0.3);
      letter-spacing: 1px;
    }

    button:hover:not(:disabled) {
      transform: scale(0.98);
      background: linear-gradient(95deg, #ff2a2a, #d11111);
      box-shadow: 0 6px 14px rgba(255, 0, 0, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .console {
      margin-top: 1.8rem;
      background: #050507e0;
      border-radius: 1.2rem;
      padding: 1rem;
      height: 280px;
      overflow-y: auto;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.75rem;
      border: 1px solid #2a2a32;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    }

    .console div {
      margin-bottom: 6px;
      padding-bottom: 2px;
      border-bottom: 1px dotted #1e1e26;
      word-break: break-word;
      line-height: 1.4;
    }

    .success { color: #3eff9e; }
    .error { color: #ff7070; background: rgba(255, 50, 50, 0.08); border-left: 3px solid #ff4a4a; padding-left: 8px; }
    .info { color: #6bc8ff; }
    .warn { color: #ffcf4a; }
    .gray { color: #8f93a3; font-style: italic; }

    .badge {
      font-size: 0.7rem;
      text-align: right;
      margin-top: 0.8rem;
      color: #646b7e;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: #ff4d4d;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="title">⚡ SMART AUTH</div>
  <div class="sub">secure · hardware bound</div>

  <div class="line">
    <label class="label">🔑 LICENSE KEY</label>
    <input type="text" id="key" placeholder="Enter your license key" autocomplete="off">
  </div>

  <button id="authBtn">⟳ AUTHENTICATE</button>

  <div class="console" id="consolePanel">
    <div class="gray">» System ready</div>
  </div>
  <div class="badge">✓ HWID fingerprint · Secure authentication</div>
</div>

<script>
  (function() {
    const API_URL = "https://smarttcheat.interiorsita.com/api/client/auth";
    const REDIRECT_URL = "https://smarttcheat.interiorsita.com";
    
    // CORS proxies (fallback if direct access fails)
    const CORS_PROXIES = [
      "https://cors-anywhere.herokuapp.com/",
      "https://api.allorigins.win/raw?url=",
      "https://thingproxy.freeboard.io/fetch/"
    ];
    
    const keyInput = document.getElementById("key");
    const authBtn = document.getElementById("authBtn");
    const consoleDiv = document.getElementById("consolePanel");
    
    let currentProxyIndex = 0;
    let useProxy = false;
    
    function addLog(message, type = "info") {
      const logEntry = document.createElement("div");
      const icons = { success: "✓ ", error: "✗ ", warn: "⚠ ", info: "ℹ ", gray: "· " };
      logEntry.className = type;
      logEntry.innerText = (icons[type] || "ℹ ") + message;
      consoleDiv.appendChild(logEntry);
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }
    
    function generateHWID() {
      try {
        const components = [
          navigator.userAgent,
          screen.width + 'x' + screen.height,
          screen.colorDepth,
          navigator.language,
          navigator.platform,
          navigator.hardwareConcurrency || 'unknown',
          navigator.deviceMemory || 'unknown',
          new Date().getTimezoneOffset(),
          Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown'
        ];
        
        let fingerprint = components.join('|');
        let hash = 0;
        for (let i = 0; i < fingerprint.length; i++) {
          const char = fingerprint.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        
        return Math.abs(hash).toString(16).toUpperCase().padEnd(32, '0').substring(0, 32);
      } catch (e) {
        return btoa(navigator.userAgent + screen.width + screen.height).substring(0, 32);
      }
    }
    
    function saveKey(key) {
      if (key && key.trim()) localStorage.setItem("smart_auth_key", key.trim());
    }
    
    function loadKey() {
      return localStorage.getItem("smart_auth_key");
    }
    
    function clearConsole() {
      while (consoleDiv.children.length > 1) {
        consoleDiv.removeChild(consoleDiv.lastChild);
      }
    }
    
    async function fetchWithTimeout(url, options, timeout = 10000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      
      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        return response;
      } catch (error) {
        clearTimeout(timeoutId);
        throw error;
      }
    }
    
    async function authenticateWithProxy(licenseKey, hwid, proxyUrl) {
      let targetUrl;
      let requestOptions;
      
      if (proxyUrl.includes("allorigins")) {
        targetUrl = proxyUrl + encodeURIComponent(API_URL);
        requestOptions = {
          method: "GET",
          headers: { "Content-Type": "application/json" }
        };
      } else if (proxyUrl.includes("cors-anywhere")) {
        targetUrl = proxyUrl + API_URL;
        requestOptions = {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Origin": window.location.origin
          },
          body: JSON.stringify({ key: licenseKey, hwid: hwid, timestamp: Date.now() })
        };
      } else {
        targetUrl = proxyUrl + API_URL;
        requestOptions = {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key: licenseKey, hwid: hwid, timestamp: Date.now() })
        };
      }
      
      const response = await fetchWithTimeout(targetUrl, requestOptions, 15000);
      
      if (proxyUrl.includes("allorigins")) {
        const text = await response.text();
        const data = JSON.parse(text);
        return data.contents ? JSON.parse(data.contents) : data;
      }
      
      return await response.json();
    }
    
    async function authenticateDirect(licenseKey, hwid) {
      const response = await fetchWithTimeout(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          key: licenseKey,
          hwid: hwid,
          timestamp: Date.now(),
          client: "web_interface"
        })
      }, 10000);
      
      return await response.json();
    }
    
    async function authenticate(licenseKey, hwid) {
      if (useProxy && currentProxyIndex < CORS_PROXIES.length) {
        addLog(`Trying CORS proxy (${currentProxyIndex + 1}/${CORS_PROXIES.length})...`, "info");
        try {
          return await authenticateWithProxy(licenseKey, hwid, CORS_PROXIES[currentProxyIndex]);
        } catch (error) {
          addLog(`Proxy ${currentProxyIndex + 1} failed: ${error.message}`, "warn");
          currentProxyIndex++;
          return await authenticate(licenseKey, hwid);
        }
      } else if (!useProxy) {
        try {
          return await authenticateDirect(licenseKey, hwid);
        } catch (error) {
          if (error.message.includes("fetch") || error.message.includes("CORS") || error.message.includes("NetworkError")) {
            addLog("Direct connection failed due to CORS/network issue", "warn");
            addLog("Switching to CORS proxy mode...", "info");
            useProxy = true;
            currentProxyIndex = 0;
            return await authenticate(licenseKey, hwid);
          }
          throw error;
        }
      }
      
      throw new Error("All connection methods failed");
    }
    
    async function performAuth() {
      const licenseKey = keyInput.value.trim();
      
      if (!licenseKey) {
        addLog("License key is required", "error");
        return false;
      }
      
      clearConsole();
      addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "gray");
      addLog("SMART AUTH SYSTEM", "info");
      addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "gray");
      
      const hwid = generateHWID();
      addLog(`HWID: ${hwid}`, "warn");
      
      saveKey(licenseKey);
      addLog("Connecting to authentication server...", "info");
      
      try {
        const data = await authenticate(licenseKey, hwid);
        
        if (data && (data.success === true || data.authenticated === true || data.status === "success")) {
          addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "success");
          addLog("AUTHENTICATION SUCCESSFUL ✓", "success");
          addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "success");
          
          if (data.message) addLog(data.message, "info");
          if (data.expires_at) addLog(`License active until: ${data.expires_at}`, "info");
          
          addLog("Access granted! Opening dashboard...", "warn");
          
          setTimeout(() => {
            window.open(REDIRECT_URL, "_blank");
            addLog("Dashboard opened in new tab", "success");
          }, 500);
          
          return true;
        } else {
          addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "error");
          addLog("AUTHENTICATION FAILED ✗", "error");
          addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "error");
          
          const errorMsg = data?.message || data?.error || "Invalid license key or HWID mismatch";
          addLog(errorMsg, "error");
          
          return false;
        }
      } catch (error) {
        addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "error");
        addLog("CONNECTION ERROR", "error");
        addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "error");
        
        if (error.name === "AbortError") {
          addLog("Request timeout - Server not responding", "error");
          addLog("Please check your internet connection and try again", "warn");
        } else if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError")) {
          addLog("Cannot reach authentication server", "error");
          addLog("Possible causes:", "warn");
          addLog("• CORS policy restrictions", "info");
          addLog("• Server is offline", "info");
          addLog("• Network firewall blocking the request", "info");
          addLog("ℹ If the server supports CORS, this will work. Otherwise, contact support.", "gray");
        } else {
          addLog(error.message, "error");
        }
        
        addLog("━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "gray");
        addLog("Troubleshooting tips:", "info");
        addLog("1. Make sure the API server accepts CORS requests", "gray");
        addLog("2. Try using a browser extension to disable CORS", "gray");
        addLog("3. Run this HTML file from a local web server", "gray");
        
        return false;
      }
    }
    
    let isProcessing = false;
    
    async function login() {
      if (isProcessing) {
        addLog("Authentication already in progress...", "warn");
        return;
      }
      
      isProcessing = true;
      authBtn.disabled = true;
      authBtn.textContent = "⏳ VERIFYING...";
      
      try {
        await performAuth();
      } catch (err) {
        addLog(`Unexpected error: ${err.message}`, "error");
      } finally {
        isProcessing = false;
        authBtn.disabled = false;
        authBtn.textContent = "⟳ AUTHENTICATE";
      }
    }
    
    function init() {
      const savedKey = loadKey();
      if (savedKey) {
        keyInput.value = savedKey;
        addLog("Loaded saved license key", "success");
      }
      
      authBtn.addEventListener("click", (e) => {
        e.preventDefault();
        login();
      });
      
      keyInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") login();
      });
      
      addLog("Ready for authentication", "info");
      addLog("ℹ If you see CORS errors, the server needs to allow cross-origin requests", "warn");
    }
    
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
</body>
</html>
